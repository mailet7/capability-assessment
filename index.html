<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capability Path Assessment</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f1e8;
      color: #2f2f2a;
      line-height: 1.6;
    }

    .page {
      max-width: 760px;
      margin: 0 auto;
      padding: 32px 18px;
    }

    .card {
      background: #fffaf2;
      border: 1px solid #e4d8c6;
      border-radius: 22px;
      padding: 28px;
    }

    h1 {
      font-size: 34px;
      line-height: 1.15;
      margin: 0 0 16px;
    }

    p {
      font-size: 18px;
      margin: 0;
    }

    .accent {
      color: #9c7a2f;
      font-weight: bold;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 14px;
      margin-bottom: 12px;
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="card">
      <div class="accent">Capability Path</div>
      <h1>Assessment</h1>
      <p>
        A calm parent observation tool for seeing your child’s current strengths,
        what may be breaking first, and the next developmental edge.
      </p>
    </section>
  </main>
</body>
</html>
